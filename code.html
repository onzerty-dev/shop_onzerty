<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vérification</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #313338;
    font-family: 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    padding: 1.5rem;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    z-index: 0;
    pointer-events: none;
  }
  body::before {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #5865f230 0%, transparent 70%);
    top: -150px; left: -150px;
  }
  body::after {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #eb459e20 0%, transparent 70%);
    bottom: -100px; right: -100px;
  }

  .card {
    background: #2b2d31;
    border-radius: 4px;
    padding: 2rem 2rem 1.5rem;
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.3s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    justify-content: center;
    margin-bottom: 1rem;
  }
  .logo svg { width: 48px; height: 48px; }

  .card-title {
    font-size: 24px;
    font-weight: 700;
    color: #f2f3f5;
    text-align: center;
    margin-bottom: 0.25rem;
    letter-spacing: -0.3px;
  }

  .card-sub {
    font-size: 14px;
    color: #b5bac1;
    text-align: center;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }

  .card-sub strong {
    color: #dbdee1;
    font-weight: 500;
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 1.5rem;
  }

  .progress-wrap span {
    flex: 1;
    height: 4px;
    border-radius: 99px;
    background: #3b3d44;
  }

  .progress-wrap span.done { background: #5865f2; }

  .progress-label {
    font-size: 11px;
    color: #b5bac1;
    text-align: right;
    margin-bottom: 0.75rem;
    margin-top: -1rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    font-weight: 700;
  }

  /* Code boxes */
  .code-label {
    font-size: 12px;
    font-weight: 700;
    color: #b5bac1;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 10px;
    display: block;
  }

  .code-label .req { color: #ed4245; margin-left: 2px; }

  .code-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 6px;
  }

  .code-box {
    width: 64px;
    height: 64px;
    background: #1e1f22;
    border: 1px solid #1e1f22;
    border-radius: 3px;
    font-size: 28px;
    font-weight: 700;
    font-family: inherit;
    color: #f2f3f5;
    text-align: center;
    outline: none;
    caret-color: #5865f2;
    transition: border-color 0.15s;
    /* Fix vendor prefix warning — both standard and webkit */
    -moz-appearance: textfield;
    appearance: textfield;
  }

  .code-box::-webkit-outer-spin-button,
  .code-box::-webkit-inner-spin-button {
    -webkit-appearance: none;
    appearance: none;
  }

  .code-box:focus {
    border-color: #5865f2;
  }

  .code-box.filled {
    border-color: #4752c4;
    color: #fff;
  }

  .code-box.error-border {
    border-color: #ed4245;
    animation: shake 0.35s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-5px); }
    40%       { transform: translateX(5px); }
    60%       { transform: translateX(-3px); }
    80%       { transform: translateX(3px); }
  }

  .error-msg {
    display: block;
    font-size: 12px;
    font-style: italic;
    color: #ed4245;
    text-align: center;
    margin-top: 8px;
    min-height: 16px;
  }

  .resend {
    text-align: center;
    font-size: 14px;
    color: #b5bac1;
    margin-top: 1rem;
  }

  .resend button {
    background: none;
    border: none;
    color: #00a8fc;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    padding: 0;
    text-decoration: none;
  }

  .resend button:hover { text-decoration: underline; }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 1.5rem;
  }

  .btn-back {
    padding: 11px 16px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid #4e5058;
    border-radius: 3px;
    color: #b5bac1;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .btn-back:hover { background: #3b3d44; }

  .btn-submit {
    flex: 1;
    padding: 11px;
    font-size: 16px;
    font-family: inherit;
    font-weight: 500;
    background: #5865f2;
    border: none;
    border-radius: 3px;
    color: #fff;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .btn-submit:hover { background: #4752c4; }
  .btn-submit:active { transform: scale(0.99); }

  .divider {
    border: none;
    border-top: 1px solid #3b3d44;
    margin: 1.25rem 0 1rem;
  }

  /* ---- Success screen ---- */
  .success { display: none; text-align: center; }

  .success-icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #23a55a22;
    border: 2px solid #23a55a55;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes popIn {
    from { transform: scale(0.4); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .success-title {
    font-size: 24px;
    font-weight: 700;
    color: #f2f3f5;
    margin-bottom: 0.35rem;
    letter-spacing: -0.3px;
  }

  .success-sub {
    font-size: 14px;
    color: #b5bac1;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }

  .summary {
    background: #1e1f22;
    border-radius: 3px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    text-align: left;
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
  }

  .summary-row:not(:last-child) {
    border-bottom: 1px solid #2b2d31;
  }

  .summary-key {
    font-size: 12px;
    font-weight: 700;
    color: #72767d;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .summary-val {
    font-size: 14px;
    font-weight: 500;
    color: #dbdee1;
  }

  .online-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #23a55a22;
    border: 1px solid #23a55a44;
    border-radius: 3px;
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 700;
    color: #23a55a;
    margin-bottom: 1.5rem;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #23a55a;
  }

  .btn-restart {
    width: 100%;
    padding: 11px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid #4e5058;
    border-radius: 3px;
    color: #b5bac1;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-restart:hover { background: #3b3d44; }
</style>
</head>
<body>

<div class="card">

  <!-- ÉTAPE CODE -->
  <div id="step-code">

    <div class="logo">
      <svg viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
        <path fill="#5865f2" d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
      </svg>
    </div>

    <h1 class="card-title">Vérifie ton numéro</h1>
    <p class="card-sub" id="desc-phone">Saisis le code à 4 chiffres envoyé au <strong id="phone-display"></strong></p>

    <div class="progress-wrap">
      <span class="done"></span>
      <span class="done"></span>
      <span class="done"></span>
    </div>
    <p class="progress-label">Étape 3 sur 3</p>

    <span class="code-label">Code de vérification <span class="req">*</span></span>

    <div class="code-row" id="code-row">
      <input class="code-box" type="tel" inputmode="numeric" maxlength="1" id="c0">
      <input class="code-box" type="tel" inputmode="numeric" maxlength="1" id="c1">
      <input class="code-box" type="tel" inputmode="numeric" maxlength="1" id="c2">
      <input class="code-box" type="tel" inputmode="numeric" maxlength="1" id="c3">
    </div>

    <span class="error-msg" id="err"></span>

    <p class="resend">Tu n'as pas reçu le code ? <button onclick="resend()">Renvoyer</button></p>

    <div class="btn-row">
      <button class="btn-back" onclick="window.location.href='numero.html'">← Retour</button>
      <button class="btn-submit" onclick="verify()">Vérifier</button>
    </div>

    <hr class="divider">
    <p style="font-size:14px; color:#b5bac1;">Tu as déjà un compte ? <a href="#" style="color:#00a8fc; text-decoration:none;">Se connecter</a></p>

  </div>

  <!-- SUCCÈS -->
  <div class="success" id="step-success">

    <div class="success-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
        <path d="M5 13l4 4L19 7" stroke="#23a55a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h2 class="success-title" id="success-title">Bienvenue !</h2>
    <p class="success-sub">Ton compte Discord a été créé avec succès.</p>

    <div class="online-badge">
      <span class="dot"></span>
      En ligne
    </div>

    <div class="summary">
      <div class="summary-row">
        <span class="summary-key">Pseudo</span>
        <span class="summary-val" id="sum-pseudo">—</span>
      </div>
      <div class="summary-row">
        <span class="summary-key">Téléphone</span>
        <span class="summary-val" id="sum-phone">—</span>
      </div>
      <div class="summary-row">
        <span class="summary-key">Statut</span>
        <span class="summary-val" style="color:#23a55a;">Vérifié</span>
      </div>
    </div>

    <button class="btn-restart" onclick="restart()">Recommencer depuis le début</button>

  </div>

</div>

<script>
  /* ---- Récupération des données de session ---- */
  const phone  = sessionStorage.getItem('phone')  || '';
  const pseudo = sessionStorage.getItem('pseudo') || '';

  const phoneDisplay = document.getElementById('phone-display');
  if (phoneDisplay && phone) phoneDisplay.textContent = phone;

  /* ---- Cases du code ---- */
  const boxes = ['c0','c1','c2','c3'].map(id => document.getElementById(id));
  const err   = document.getElementById('err');

  boxes.forEach((box, i) => {
    box.addEventListener('input', () => {
      /* Garder uniquement un chiffre */
      box.value = box.value.replace(/\D/g, '').slice(-1);
      box.classList.toggle('filled', box.value !== '');

      /* Avancer automatiquement */
      if (box.value !== '' && i < 3) boxes[i + 1].focus();

      /* Vérification auto quand les 4 cases sont remplies */
      if (getCode().length === 4) setTimeout(verify, 80);
    });

    box.addEventListener('keydown', e => {
      /* Retour arrière : effacer et reculer */
      if (e.key === 'Backspace') {
        if (box.value) {
          box.value = '';
          box.classList.remove('filled');
        } else if (i > 0) {
          boxes[i - 1].value = '';
          boxes[i - 1].classList.remove('filled');
          boxes[i - 1].focus();
        }
        e.preventDefault();
      }
    });

    /* Coller un code complet */
    box.addEventListener('paste', e => {
      e.preventDefault();
      const pasted = (e.clipboardData || window.clipboardData)
        .getData('text').replace(/\D/g, '').slice(0, 4);
      pasted.split('').forEach((ch, idx) => {
        if (boxes[idx]) {
          boxes[idx].value = ch;
          boxes[idx].classList.add('filled');
        }
      });
      const focus = Math.min(pasted.length, 3);
      boxes[focus].focus();
      if (pasted.length === 4) setTimeout(verify, 80);
    });
  });

  /* Focus la première case au chargement */
  boxes[0].focus();

  function getCode() {
    return boxes.map(b => b.value).join('');
  }

  /* ---- Vérification (code fictif : 1234) ---- */
  const VALID_CODE = '1234';
  let isVerifying = false;

  function verify() {
    if (isVerifying) return;
    const code = getCode();

    if (code.length < 4) {
      err.textContent = 'Saisis les 4 chiffres du code.';
      return;
    }

    if (code !== VALID_CODE) {
      isVerifying = true;
      err.textContent = 'Code incorrect. Réessaie.';

      boxes.forEach(b => {
        b.classList.remove('filled');
        b.classList.add('error-border');
      });

      setTimeout(() => {
        boxes.forEach(b => {
          b.value = '';
          b.classList.remove('error-border');
        });
        boxes[0].focus();
        isVerifying = false;
      }, 600);

      return;
    }

    err.textContent = '';
    showSuccess();
  }

  function showSuccess() {
    document.getElementById('step-code').style.display = 'none';
    const s = document.getElementById('step-success');
    s.style.display = 'block';

    document.getElementById('success-title').textContent =
      'Bienvenue, ' + (pseudo || 'toi') + ' !';
    document.getElementById('sum-pseudo').textContent = pseudo || '—';
    document.getElementById('sum-phone').textContent  = phone  || '—';
  }

  function resend() {
    const btn = document.querySelector('.resend button');
    btn.disabled = true;
    btn.textContent = 'Code renvoyé !';
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = 'Renvoyer';
    }, 3000);
  }

  function restart() {
    sessionStorage.clear();
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
